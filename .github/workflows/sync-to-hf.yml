name: Sync to Hugging Face Spaces

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          # username(openmen-gif)은 공개 정보라 하드코딩 — HF_USERNAME 시크릿 누락으로
          # URL 이 깨져 silent fail 하던 문제 제거. HF_TOKEN(Write) 하나만 있으면 배포됨.
          git push https://openmen-gif:$HF_TOKEN@huggingface.co/spaces/openmen-gif/Life-Info-Dashboard master:main --force
